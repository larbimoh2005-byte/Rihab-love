<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rihab ❤️</title>
    <style>
        body { background-color: #ffe4e1; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; overflow: hidden; }
        .container { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 85%; }
        img { width: 200px; height: auto; border-radius: 15px; border: 5px solid #ff69b4; margin-bottom: 15px; object-fit: cover; }
        h1 { color: #d02090; font-size: 22px; margin-bottom: 20px; }
        .buttons { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { padding: 12px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        #yesBtn { background-color: #ff69b4; color: white; font-weight: bold; width: auto; }
        #noBtn { background-color: #f0f0f0; color: #333; font-size: 14px; }
        #celebration { display: none; }
    </style>
</head>
<body>
    <div id="main-content" class="container">
        <img src="couple.jpg" alt="Us">
        <h1>Rihab, will you be my Valentine? 🌹</h1>
        <div class="buttons">
            <button id="yesBtn">Yes! ❤️</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="celebration" class="container">
        <h1>Yay! I love you, Rihab! ❤️✨</h1>
        <img src="couple.jpg" alt="Us">
        <p>See you on Valentine's Day!</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const main = document.getElementById('main-content');
        const celeb = document.getElementById('celebration');
        let size = 18;

        noBtn.addEventListener('click', () => {
            size += 35;
            yesBtn.style.fontSize = size + 'px';
            yesBtn.style.padding = (size/2) + 'px ' + size + 'px';
        });

        yesBtn.addEventListener('click', () => {
            main.style.display = 'none';
            celeb.style.display = 'block';
            document.body.style.backgroundColor = '#ff69b4';
        });
    </script>
</body>
</html>
